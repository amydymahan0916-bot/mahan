<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAHAN | Cyber Security</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, sans-serif;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,255,150,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,150,.05) 1px,transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(0,255,150,.3);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,255,150,.15);
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    border:3px solid #00ff99;
    object-fit:cover;
}

h1{
    margin-top:20px;
    color:#00ff99;
    font-size:35px;
}

.typing{
    margin:15px 0;
    color:#aaa;
}
    <section class="container">
<div class="card">

<h2 style="color:#00ff99">About Me</h2>

<p class="typing">
توسعه‌دهنده و فعال حوزه فناوری، برنامه‌نویسی و امنیت سایبری.
ساخت تجربه‌های دیجیتال مدرن و امن.
</p>

<h2 style="color:#00ff99;margin-top:30px">Skills</h2>

<div class="skills">

<div class="box">💻 Web Development</div>
<div class="box">🔐 Cyber Security</div>
<div class="box">⚙️ Programming</div>
<div class="box">🌐 Digital Solutions</div>

</div>


<h2 style="color:#00ff99;margin-top:30px">
Contact
</h2>

<p>
برای همکاری و ارتباط:
</p>

<a href="#" class="btn">
تماس با من
</a>


</div>
</section>


<style>

.skills{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}


.box{
padding:20px;
border-radius:15px;
background:rgba(0,255,150,.08);
border:1px solid rgba(0,255,150,.3);
transition:.3s;
}


.box:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #00ff99;
}


.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
border-radius:30px;
background:#00ff99;
color:#000;
text-decoration:none;
font-weight:bold;
}


.btn:hover{
box-shadow:0 0 20px #00ff99;
}


@media(max-width:600px){

h1{
font-size:28px;
}

.card{
padding:25px;
}

}

</style>


</div>
</body>
</html>
